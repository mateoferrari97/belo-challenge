services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: belo
      POSTGRES_PASSWORD: belo
      POSTGRES_DB: belo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belo -d belo"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:4
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://belo:belo@postgres:5432/belo?sslmode=disable",
        "up"
      ]

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://belo:belo@postgres:5432/belo?sslmode=disable"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
